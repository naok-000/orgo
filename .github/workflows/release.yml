name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Build binaries
        run: |
          set -euo pipefail
          mkdir -p out
          for target in linux/amd64 linux/arm64 darwin/amd64 darwin/arm64; do
            export GOOS=${target%/*} GOARCH=${target#*/} CGO_ENABLED=0
            go build -trimpath -ldflags "-s -w -X main.version=${GITHUB_REF_NAME}" -o "out/orgo_${GOOS}_${GOARCH}/orgo" .
            tar -C "out/orgo_${GOOS}_${GOARCH}" -czf "out/orgo_${GITHUB_REF_NAME}_${GOOS}_${GOARCH}.tar.gz" orgo
          done
      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${GITHUB_REF_NAME}" out/*.tar.gz --generate-notes
